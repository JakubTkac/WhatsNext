name: whatsnext

x-backend-environment: &backend-environment
  NODE_ENV: production
  PORT: "8080"
  FRONTEND_URL: "${FRONTEND_URL:-http://localhost:3000}"
  DB_HOST: database
  DB_PORT: "5432"
  DB_USER: "${POSTGRES_USER:-whatsnext}"
  DB_PASSWORD: "${POSTGRES_PASSWORD:-whatsnext_local_password}"
  DB_NAME: "${POSTGRES_DB:-whatsnext}"
  DB_SSL: "false"
  BCRYPT_ROUNDS: "${BCRYPT_ROUNDS:-12}"
  JWT_SECRET: "${JWT_SECRET:-local-development-jwt-secret-change-before-production-2026}"
  JWT_EXPIRES_IN_SECONDS: "${JWT_EXPIRES_IN_SECONDS:-86400}"
  JWT_ISSUER: "${JWT_ISSUER:-whatsnext-api}"
  JWT_AUDIENCE: "${JWT_AUDIENCE:-whatsnext-web}"

services:
  database:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-whatsnext}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-whatsnext_local_password}"
      POSTGRES_DB: "${POSTGRES_DB:-whatsnext}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    restart: unless-stopped
    stop_grace_period: 30s

  backend-init:
    image: whatsnext-backend:local
    build:
      context: ./backend
    environment: *backend-environment
    depends_on:
      database:
        condition: service_healthy
    command:
      ["sh", "-c", "npm run migration:run:prod && npm run seed:prod:if-empty"]
    restart: "no"

  backend:
    image: whatsnext-backend:local
    build:
      context: ./backend
    environment: *backend-environment
    depends_on:
      backend-init:
        condition: service_completed_successfully
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/api/health').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    init: true
    restart: unless-stopped
    stop_grace_period: 30s

  frontend:
    image: whatsnext-frontend:local
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost:8080/api}"
        SITE_URL: "${SITE_URL:-http://localhost:3000}"
    environment:
      API_URL: http://backend:8080/api
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost:8080/api}"
      SITE_URL: "${SITE_URL:-http://localhost:3000}"
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 8s
      retries: 12
      start_period: 10s
    init: true
    restart: unless-stopped
    stop_grace_period: 30s

volumes:
  postgres_data:
