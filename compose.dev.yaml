name: whatsnext-dev

x-backend-environment: &backend-environment
  NODE_ENV: development
  PORT: "8080"
  FRONTEND_URL: "${FRONTEND_URL:-http://localhost:3000}"
  DB_HOST: database
  DB_PORT: "5432"
  DB_USER: "${POSTGRES_USER:-whatsnext}"
  DB_PASSWORD: "${POSTGRES_PASSWORD:-whatsnext_local_password}"
  DB_NAME: "${POSTGRES_DB:-whatsnext}"
  DB_SSL: "false"
  BCRYPT_ROUNDS: "${BCRYPT_ROUNDS:-12}"
  JWT_SECRET: "${JWT_SECRET:-dev-only-jwt-secret-change-before-deployment}"
  JWT_EXPIRES_IN_SECONDS: "${JWT_EXPIRES_IN_SECONDS:-86400}"
  JWT_ISSUER: "${JWT_ISSUER:-whatsnext-api}"
  JWT_AUDIENCE: "${JWT_AUDIENCE:-whatsnext-web}"

x-backend-volumes: &backend-volumes
  - ./backend:/app
  - backend_node_modules:/app/node_modules

services:
  database:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-whatsnext}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-whatsnext_local_password}"
      POSTGRES_DB: "${POSTGRES_DB:-whatsnext}"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    restart: unless-stopped
    stop_grace_period: 30s

  backend-init:
    image: node:24-bookworm-slim
    working_dir: /app
    environment: *backend-environment
    volumes: *backend-volumes
    depends_on:
      database:
        condition: service_healthy
    command:
      [
        "sh",
        "-c",
        "npm ci && npm run migration:run && npm run seed -- --if-empty",
      ]
    restart: "no"

  backend:
    image: node:24-bookworm-slim
    working_dir: /app
    environment:
      <<: *backend-environment
      CHOKIDAR_USEPOLLING: "true"
    volumes: *backend-volumes
    depends_on:
      backend-init:
        condition: service_completed_successfully
    command: ["npm", "run", "start:dev"]
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/api/health').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s
    init: true
    restart: unless-stopped
    stop_grace_period: 30s

  frontend-init:
    image: node:24-bookworm-slim
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: ["npm", "ci"]
    restart: "no"

  frontend:
    image: node:24-bookworm-slim
    working_dir: /app
    environment:
      API_URL: http://backend:8080/api
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost:8080/api}"
      SITE_URL: "${SITE_URL:-http://localhost:3000}"
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      frontend-init:
        condition: service_completed_successfully
      backend:
        condition: service_healthy
    command: ["npm", "run", "dev", "--", "--hostname", "0.0.0.0"]
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 8s
      retries: 12
      start_period: 30s
    init: true
    restart: unless-stopped
    stop_grace_period: 30s

volumes:
  postgres_dev_data:
  backend_node_modules:
  frontend_node_modules:
  frontend_next:
